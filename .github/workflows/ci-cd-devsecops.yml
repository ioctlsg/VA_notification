name: CI/CD DevSecOps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python syntax
        run: python -m py_compile notifier.py ack_event.py ack_latest.py

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff lint
        run: ruff check .

  snyk-code-security:
    name: Snyk Code Security Scan
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check whether Snyk is configured
        id: snyk_config
        shell: bash
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN is not configured; skipping Snyk scan."
          fi

      - name: Set up Snyk CLI
        if: steps.snyk_config.outputs.enabled == 'true'
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk
        if: steps.snyk_config.outputs.enabled == 'true'
        run: snyk auth "$SNYK_TOKEN"

      - name: Run Snyk code test
        if: steps.snyk_config.outputs.enabled == 'true'
        run: snyk code test --severity-threshold=high
